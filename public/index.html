<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Victor – Veritech</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #3D7DFF;
      --navy: #1E2B58;
      --yellow: #FFB800;
      --grey: #F5F7FA;
      --charcoal: #2D3748;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e5e7eb;
      color: var(--charcoal);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      height: 600px;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--yellow);
      flex-shrink: 0;
    }

    .avatar-fallback {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--yellow);
      border: 2px solid var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: var(--navy);
      flex-shrink: 0;
    }

    .header-info h1 {
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
    }

    .header-info span {
      color: #a0aec0;
      font-size: 12px;
    }

    .btn-new {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: #ffffff;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .btn-new:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.45);
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #ffffff;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 720px;
      width: 100%;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
      border: 1.5px solid var(--yellow);
    }

    .msg-avatar-fallback {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--yellow);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14.5px;
      line-height: 1.6;
      max-width: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.assistant .bubble {
      background: var(--grey);
      color: var(--charcoal);
      border-top-left-radius: 4px;
    }

    .message.user .bubble {
      background: var(--blue);
      color: #ffffff;
      border-top-right-radius: 4px;
    }

    /* ── Typing indicator ── */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #a0aec0;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    #input-area {
      padding: 12px 16px;
      background: #ffffff;
      border-top: 1px solid #e2e8f0;
      flex-shrink: 0;
    }

    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 720px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14.5px;
      color: var(--charcoal);
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 130px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #user-input:focus { border-color: var(--blue); }
    #user-input::placeholder { color: #a0aec0; }

    #send-btn {
      background: var(--blue);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }

    #send-btn:hover { background: #2d6de8; }
    #send-btn:disabled { opacity: 0.45; cursor: default; }

    #send-btn svg { width: 18px; height: 18px; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      header { padding: 10px 14px; }
      #chat { padding: 14px 10px; }
      #input-area { padding: 10px 10px; }
    }
  </style>
</head>
<body>
<div id="app">

<header>
  <div class="header-left">
    <img class="avatar" src="victor.png" alt="Victor" id="header-avatar"
         onerror="this.style.display='none'; document.getElementById('header-fallback').style.display='flex';" />
    <div class="avatar-fallback" id="header-fallback" style="display:none;">V</div>
    <div class="header-info">
      <h1>Victor</h1>
      <span>Online trainer elektrotechniek · Veritech</span>
    </div>
  </div>
  <button class="btn-new" onclick="newConversation()">Nieuw gesprek</button>
</header>

<div id="chat"></div>

<div id="input-area">
  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="Stel een vraag aan Victor…" maxlength="2000"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Verstuur">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const chatEl = document.getElementById('chat');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  let history = [];
  let isFirstResponse = true;

  function avatarEl() {
    const img = document.createElement('img');
    img.src = 'victor.png';
    img.alt = 'Victor';
    img.className = 'msg-avatar';
    img.onerror = function () {
      const fallback = document.createElement('div');
      fallback.className = 'msg-avatar-fallback';
      fallback.textContent = 'V';
      img.replaceWith(fallback);
    };
    return img;
  }

  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    if (role === 'assistant') {
      wrap.appendChild(avatarEl());
    }
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'message assistant typing';
    wrap.id = 'typing-indicator';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(avatarEl());
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, isFirstResponse }),
      });

      const data = await res.json();
      removeTyping();

      if (data.reply) {
        addMessage('assistant', data.reply);
        history.push({ role: 'assistant', content: data.reply });
        isFirstResponse = false;
      } else {
        addMessage('assistant', data.error || 'Er ging iets mis. Probeer het opnieuw.');
      }
    } catch {
      removeTyping();
      addMessage('assistant', 'Kan de server niet bereiken. Probeer het opnieuw.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function newConversation() {
    history = [];
    isFirstResponse = true;
    chatEl.innerHTML = '';
    addMessage('assistant', 'Hallo, ik ben Victor. Wat wil je weten?');
    inputEl.focus();
  }

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
  });

  newConversation();
</script>
</div>
</body>
</html>
