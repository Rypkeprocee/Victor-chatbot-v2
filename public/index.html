<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Victor – Veritech</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #3D7DFF;
      --navy: #1E2B58;
      --yellow: #FFB800;
      --grey: #F5F7FA;
      --charcoal: #2D3748;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e5e7eb;
      color: var(--charcoal);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }

    #app {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      transition: height 0.3s ease;
      height: 68px;
    }

    #app.expanded {
      height: 580px;
    }

    /* ── Header ── */
    #app-header {
      background: var(--navy);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      height: 68px;
      cursor: pointer;
      user-select: none;
    }

    #app-header:hover { background: #253570; }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--yellow);
      flex-shrink: 0;
    }

    .avatar-fallback {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 17px;
      color: var(--navy);
      flex-shrink: 0;
    }

    .header-info h1 {
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
    }

    .header-info span {
      color: #a0aec0;
      font-size: 11.5px;
    }

    .chevron {
      color: rgba(255,255,255,0.55);
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    #app.expanded .chevron {
      transform: rotate(180deg);
    }

    /* ── Chat body ── */
    #chat-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Messages ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 6px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .message {
      display: flex;
      gap: 8px;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
      border: 1.5px solid var(--yellow);
    }

    .msg-avatar-fallback {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--yellow);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--navy);
    }

    .bubble {
      padding: 9px 12px;
      border-radius: 13px;
      font-size: 13.5px;
      line-height: 1.6;
      max-width: calc(100% - 38px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.assistant .bubble {
      background: var(--grey);
      color: var(--charcoal);
      border-top-left-radius: 4px;
    }

    .message.user .bubble {
      background: var(--blue);
      color: #ffffff;
      border-top-right-radius: 4px;
    }

    /* Typing */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 14px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #a0aec0;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Niveau buttons ── */
    #niveau-area {
      padding: 10px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      flex-shrink: 0;
    }

    #niveau-area p {
      font-size: 12px;
      color: #718096;
      margin-bottom: 2px;
    }

    .niveau-btn {
      background: var(--grey);
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 13px;
      color: var(--charcoal);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      line-height: 1.4;
      transition: background 0.15s, border-color 0.15s;
    }

    .niveau-btn:hover {
      background: #edf2ff;
      border-color: var(--blue);
      color: var(--navy);
    }

    /* ── Clarity buttons ── */
    #clarity-area {
      padding: 6px 14px;
      display: none;
      gap: 8px;
      flex-shrink: 0;
    }

    #clarity-area.visible { display: flex; }

    .clarity-btn {
      flex: 1;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 12.5px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .clarity-btn.ja {
      background: transparent;
      border: 1.5px solid #48bb78;
      color: #276749;
    }
    .clarity-btn.ja:hover { background: #f0fff4; }

    .clarity-btn.nee {
      background: transparent;
      border: 1.5px solid var(--blue);
      color: var(--blue);
    }
    .clarity-btn.nee:hover { background: #edf2ff; }

    /* ── Input area ── */
    #input-area {
      padding: 8px 14px 12px;
      border-top: 1px solid #e2e8f0;
      flex-shrink: 0;
      display: none;
    }

    #input-area.visible { display: block; }

    #input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      padding: 8px 12px;
      font-size: 13.5px;
      color: var(--charcoal);
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 100px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #user-input:focus { border-color: var(--blue); }
    #user-input::placeholder { color: #a0aec0; }

    #send-btn {
      background: var(--blue);
      color: #ffffff;
      border: none;
      border-radius: 9px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }

    #send-btn:hover { background: #2d6de8; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #send-btn svg { width: 15px; height: 15px; }

    /* ── End message ── */
    #end-message {
      padding: 10px 14px 14px;
      font-size: 12.5px;
      color: #718096;
      text-align: center;
      display: none;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="app">

  <header id="app-header" onclick="toggleExpand()">
    <div class="header-left">
      <img class="avatar" src="victor.png" alt="Victor" id="header-avatar"
           onerror="this.style.display='none'; document.getElementById('header-fallback').style.display='flex';" />
      <div class="avatar-fallback" id="header-fallback" style="display:none;">V</div>
      <div class="header-info">
        <h1>Victor</h1>
        <span>Online trainer elektrotechniek · Veritech</span>
      </div>
    </div>
    <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </header>

  <div id="chat-body">
    <div id="chat"></div>

    <div id="niveau-area">
      <p>Kies je niveau om te beginnen:</p>
      <button class="niveau-btn" onclick="kiesNiveau(1)">Ik ben nog niet zo goed thuis in de elektrotechniek</button>
      <button class="niveau-btn" onclick="kiesNiveau(2)">Ik werk in de elektrotechniek maar heb nog geen certificaten</button>
      <button class="niveau-btn" onclick="kiesNiveau(3)">Ik heb certificaten voor NEN 3140 en/of NEN 3840</button>
    </div>

    <div id="clarity-area">
      <button class="clarity-btn ja" onclick="clarityJa()">Ja, duidelijk</button>
      <button class="clarity-btn nee" onclick="clarityNee()">Nee, meer uitleg</button>
    </div>

    <div id="input-area">
      <div id="input-row">
        <textarea id="user-input" rows="1"
          placeholder="Wat is je vraag? Geef een onderwerp of stel een vraag. Ik kan ook berekeningen maken en tonen."
          maxlength="2000"></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Verstuur">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <div id="end-message"></div>
  </div>

</div>

<script>
  const chatEl       = document.getElementById('chat');
  const inputEl      = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const appEl        = document.getElementById('app');
  const niveauArea   = document.getElementById('niveau-area');
  const clarityArea  = document.getElementById('clarity-area');
  const inputArea    = document.getElementById('input-area');
  const endMsg       = document.getElementById('end-message');

  let history  = [];
  let niveau   = null;
  let neeCount = 0;

  function toggleExpand() {
    if (appEl.classList.contains('expanded')) {
      appEl.classList.remove('expanded');
    } else {
      expand();
    }
  }

  function expand() {
    appEl.classList.add('expanded');
  }

  function avatarEl() {
    const img = document.createElement('img');
    img.src = 'victor.png';
    img.alt = 'Victor';
    img.className = 'msg-avatar';
    img.onerror = function () {
      const fb = document.createElement('div');
      fb.className = 'msg-avatar-fallback';
      fb.textContent = 'V';
      img.replaceWith(fb);
    };
    return img;
  }

  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    if (role === 'assistant') wrap.appendChild(avatarEl());
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'message assistant typing';
    wrap.id = 'typing-indicator';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    wrap.appendChild(avatarEl());
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function kiesNiveau(n) {
    niveau = n;
    const labels = {
      1: 'Ik ben nog niet zo goed thuis in de elektrotechniek',
      2: 'Ik werk in de elektrotechniek maar heb nog geen certificaten',
      3: 'Ik heb certificaten voor NEN 3140 en/of NEN 3840',
    };
    addMessage('user', labels[n]);
    niveauArea.style.display = 'none';
    inputArea.classList.add('visible');
    inputEl.focus();
  }

  function showClarityButtons() {
    clarityArea.classList.add('visible');
  }

  function hideClarityButtons() {
    clarityArea.classList.remove('visible');
  }

  function clarityJa() {
    hideClarityButtons();
    inputArea.classList.remove('visible');
    endMsg.style.display = 'block';
    endMsg.textContent = 'Goed zo. Als je een nieuwe vraag hebt, ververs dan de pagina.';
  }

  async function clarityNee() {
    neeCount++;
    hideClarityButtons();

    if (neeCount >= 3) {
      inputArea.classList.remove('visible');
      endMsg.style.display = 'block';
      endMsg.textContent = 'We beginnen een nieuw gesprek.';
      setTimeout(() => location.reload(), 3000);
      return;
    }

    const msg = 'Nee, ik begrijp het nog niet helemaal.';
    addMessage('user', msg);
    history.push({ role: 'user', content: msg });
    await callAPI();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    hideClarityButtons();
    neeCount = 0;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    await callAPI();
    sendBtn.disabled = false;
    inputEl.focus();
  }

  async function callAPI() {
    showTyping();
    expand();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, niveau }),
      });

      const data = await res.json();
      removeTyping();

      if (data.reply) {
        addMessage('assistant', data.reply);
        history.push({ role: 'assistant', content: data.reply });
        if (!data.isFallback) showClarityButtons();
      } else {
        addMessage('assistant', data.error || 'Er ging iets mis. Probeer het opnieuw.');
      }
    } catch {
      removeTyping();
      addMessage('assistant', 'Kan de server niet bereiken. Probeer het opnieuw.');
    }
  }

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });
</script>
</body>
</html>
